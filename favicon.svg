:root{color:#172033;font-synthesis:none;text-rendering:optimizelegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:#f4f8fc;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}*{box-sizing:border-box}body{min-width:320px;margin:0}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit}#root{min-height:100vh}:root{--blue-900:#0b2f63;--blue-800:#104b8f;--blue-700:#1769c2;--blue-100:#e8f2ff;--line:#dbe7f5;--surface:#fff;--muted:#67758b;--text:#172033;--success:#15803d;--warning:#c77700;--danger:#c93535;--violet:#6d5bd0;--shadow:0 18px 45px #0f3a6b1a}.app-shell{background:#f4f8fc;grid-template-columns:280px minmax(0,1fr);min-height:100vh;display:grid}.auth-shell{background:linear-gradient(135deg,#1769c21f,#ffffffd1),#f4f8fc;place-items:center;min-height:100vh;padding:24px;display:grid}.sidebar{color:#eaf3ff;background:linear-gradient(180deg, var(--blue-900), #0e427c);height:100vh;padding:24px 18px;position:sticky;top:0;overflow-y:auto}.brand{align-items:center;gap:12px;padding:6px 8px 26px;display:flex}.brand-mark,.nav-icon{border-radius:8px;flex:none;place-items:center;width:38px;height:38px;font-weight:800;display:inline-grid}.brand-mark{color:var(--blue-900);background:#fff}.brand strong,.brand span{display:block}.brand span{color:#b8d7ff;font-size:13px}.nav-list{gap:6px;display:grid}.nav-link{color:#d7e9ff;border-radius:8px;align-items:center;gap:12px;min-height:48px;padding:8px 10px;text-decoration:none;transition:background .2s,transform .2s;display:flex}.nav-link:hover,.nav-link.active{color:#fff;background:#ffffff24;transform:translate(2px)}.nav-icon{color:#fff;background:#ffffff1a;border:1px solid #ffffff2e;width:32px;height:32px;font-size:11px}.nav-link small{min-width:24px;color:var(--blue-900);text-align:center;background:#fff;border-radius:999px;margin-left:auto;padding:2px 7px}.logout-btn{color:#fff;background:#ffffff29;border:1px solid #fff3;width:calc(100% - 16px);margin:24px 8px 0}.main-content{min-width:0;padding:28px}.page,.auth-page{gap:22px;display:grid}.page-header,.panel-heading,.filter-row{justify-content:space-between;align-items:center;gap:16px;display:flex}.page-header h1,.auth-card h1{color:var(--text);letter-spacing:0;margin:4px 0 0;font-size:34px;line-height:1.1}.eyebrow{color:var(--blue-700);letter-spacing:.08em;text-transform:uppercase;margin:0;font-size:12px;font-weight:800}.status-pill,.badge,.panel-heading span{color:var(--blue-800);background:var(--blue-100);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700}.stats-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;display:grid}.stat-card,.panel,.auth-card{border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow);border-radius:8px}.stat-card{border-left:5px solid var(--blue-700);padding:20px}.stat-card span,.muted,.empty-state,.class-block span{color:var(--muted)}.stat-card strong{color:var(--text);margin-top:8px;font-size:30px;display:block}.stat-card.green{border-left-color:var(--success)}.stat-card.orange{border-left-color:var(--warning)}.stat-card.violet{border-left-color:var(--violet)}.dashboard-grid,.management-grid,.report-grid{grid-template-columns:minmax(0,1.6fr) minmax(320px,.9fr);gap:18px;display:grid}.panel,.auth-card{padding:20px}.panel h2,.auth-card h2{color:var(--text);letter-spacing:0;margin:0;font-size:20px}.panel-heading{margin-bottom:16px}.activity-list,.notification-list,.form-panel{gap:12px;display:grid}.activity-item,.notification-card{border:1px solid var(--line);background:#f9fbff;border-radius:8px;align-items:flex-start;gap:12px;padding:12px;display:flex}.activity-item p,.notification-card p,.class-block p,.warning-modal p{color:var(--muted);margin:4px 0 0}.dot{background:var(--blue-700);border-radius:999px;width:10px;height:10px;margin-top:7px}.dot.success{background:var(--success)}.dot.warning{background:var(--warning)}.dot.info{background:var(--blue-700)}.auth-page{place-items:center;min-height:calc(100vh - 56px)}.auth-card{width:min(480px,100%)}.auth-switch{color:var(--muted);text-align:center;margin:0}.auth-switch a{color:var(--blue-700);font-weight:800;text-decoration:none}.form-error{color:#9d1f1f;background:#fff2f2;border:1px solid #ffd2d2;border-radius:8px;margin:0;padding:10px 12px;font-size:14px}.profile-grid{grid-template-columns:minmax(260px,.8fr) minmax(0,1.2fr);gap:18px;display:grid}.profile-card{align-items:center;gap:16px;display:flex}.profile-card p{color:var(--muted);margin:4px 0 0}.profile-avatar{color:#fff;background:var(--blue-700);border-radius:8px;place-items:center;width:70px;height:70px;font-size:24px;font-weight:900;display:grid}.profile-summary{grid-template-columns:repeat(4,1fr);gap:12px;display:grid}.profile-summary div{border:1px solid var(--line);background:#f8fbff;border-radius:8px;padding:14px}.profile-summary strong,.profile-summary span{display:block}.profile-summary strong{font-size:26px}.profile-summary span{color:var(--muted)}label{color:#31415c;gap:7px;font-weight:700;display:grid}input,select{width:100%;min-height:44px;color:var(--text);background:#fff;border:1px solid #cbd9ea;border-radius:8px;outline:none;padding:9px 12px}input:focus,select:focus{border-color:var(--blue-700);box-shadow:0 0 0 3px #1769c226}button{color:var(--blue-800);background:var(--blue-100);border:0;border-radius:8px;padding:9px 13px;font-weight:800}button:hover{filter:brightness(.98)}.primary-btn{color:#fff;background:var(--blue-700)}.danger{color:#fff;background:var(--danger)}.table-wrap{overflow-x:auto}table{border-collapse:collapse;width:100%;min-width:680px}th,td{border-bottom:1px solid var(--line);text-align:left;vertical-align:top;padding:12px}th{color:#42536f;background:#f1f6fc;font-size:13px}tr:hover td{background:#f8fbff}.action-cell{flex-wrap:wrap;gap:8px;display:flex}.compact{box-shadow:none;border:0;padding:0}.badge.warning{color:#7c4c00;background:#fff3d6}.inline-select{width:100%}.availability-page-grid{grid-template-columns:320px minmax(0,1fr);align-items:start;gap:18px;display:grid}.availability-summary{gap:16px;display:grid;position:sticky;top:28px}.availability-count{border:1px solid var(--line);background:#f1f7ff;border-radius:8px;padding:18px}.availability-count strong,.availability-count span{display:block}.availability-count strong{color:var(--blue-800);font-size:36px;line-height:1}.availability-count span{color:var(--muted);margin-top:6px;font-weight:700}.availability-days{gap:14px;display:grid}.availability-day-card{box-shadow:none}.day-card-header{justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;display:flex}.day-card-header span{color:var(--blue-800);background:var(--blue-100);border-radius:999px;padding:6px 10px;font-size:13px;font-weight:800}.slot-list{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;display:grid}.slot-btn{min-height:74px;color:var(--blue-800);text-align:left;background:#eef6ff;border:1px solid #cbdff6;gap:4px;padding:12px;display:grid}.slot-btn span{color:#475a75;font-size:13px;font-weight:700}.slot-btn strong{color:inherit;font-size:15px}.slot-btn.selected{border-color:var(--success);color:#fff;background:var(--success)}.slot-btn.selected span{color:#d8ffe4}.filter-row{justify-content:flex-start;align-items:end}.builder-hints{flex-wrap:wrap;gap:8px;display:flex}.builder-hints span{color:var(--blue-800);background:var(--blue-100);border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800}.filter-row label{width:min(340px,100%)}.timetable-week{grid-template-columns:repeat(5,minmax(190px,1fr));gap:14px;display:grid;overflow-x:auto}.day-column{align-content:start;gap:10px;display:grid}.class-block{background:#eef6ff;border:1px solid #c9ddf4;border-radius:8px;min-height:112px;padding:12px}.class-block.empty{background:#f7f9fc}.notification-card{align-items:center}.notification-card.read{opacity:.7}.notification-card div{flex:1}.notification-card small{color:var(--muted)}.modal-backdrop{z-index:20;background:#081a3273;place-items:center;padding:20px;display:grid;position:fixed;inset:0}.warning-modal{background:#fff;border-radius:8px;width:min(520px,100%);padding:28px;box-shadow:0 24px 80px #00000038}.modal-icon{color:#fff;background:var(--warning);border-radius:50%;place-items:center;width:44px;height:44px;font-size:26px;font-weight:900;display:grid}.warning-modal ul{color:#4c5b73;padding-left:20px}.mobile-menu{display:none}@media (width<=1100px){.app-shell{grid-template-columns:1fr}.mobile-menu{z-index:31;color:#fff;background:var(--blue-800);display:inline-flex;position:fixed;top:14px;left:14px}.sidebar{z-index:30;width:280px;transition:transform .2s;position:fixed;transform:translate(-105%)}.sidebar.is-open{transform:translate(0)}.main-content{padding:72px 18px 24px}.stats-grid,.dashboard-grid,.management-grid,.report-grid,.availability-page-grid,.profile-grid{grid-template-columns:1fr}.availability-summary{position:static}}@media (width<=680px){.page-header,.panel-heading,.filter-row{flex-direction:column;align-items:stretch}.page-header h1,.auth-card h1{font-size:28px}.stats-grid{grid-template-columns:1fr}.profile-summary{grid-template-columns:repeat(2,1fr)}.panel,.auth-card,.stat-card{padding:16px}}
